<!DOCTYPE html>
<html>
<head>
  <title>PhonePe AutoPay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

  <h3>PhonePe AutoPay</h3>

  <button onclick="openPhonePe()">
    Approve AutoPay in PhonePe
  </button>

  <script>
    function openPhonePe() {
      var intentUrl = "ppesim://mandate?pa=TRISHTYUAT@ybl&pn=SUBSCRIBEMID&am=100000&mam=&tr=OM2602101555394828587566";

      window.location.href = intentUrl;

      // fallback if PhonePe not installed
      setTimeout(function () {
        alert("If PhonePe did not open, please install the PhonePe app and try again.");
      }, 1500);
    }
  </script>

</body>
</html>

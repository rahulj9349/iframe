<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Rich Text Editor</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      padding: 20px;
    }

    .toolbar {
      margin-bottom: 8px;
    }

    .toolbar button {
      padding: 6px 12px;
      margin-right: 5px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      font-weight: bold;
    }

    .toolbar button:hover {
      background: #eee;
    }

    .editor {
      border: 1px solid #ccc;
      min-height: 150px;
      padding: 10px;
      background: #fff;
      outline: none;
    }

    .preview-box {
      border: 1px solid #ccc;
      min-height: 150px;
      padding: 10px;
      background: #fff;
    }

    textarea {
      width: 100%;
      margin-top: 10px;
    }

    h4 {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h3>Rich Text Editor (Only Bold / Italic / Underline)</h3>

  <!-- ✅ Toolbar -->
  <div class="toolbar">
    <button onclick="formatText('bold')"><b>B</b></button>
    <button onclick="formatText('italic')"><i>I</i></button>
    <button onclick="formatText('underline')"><u>U</u></button>
  </div>

  <!-- ✅ Editable Area -->
  <div 
    id="editor" 
    class="editor" 
    contenteditable="true" 
    placeholder="Type here..."
    oninput="updatePreview()"
    onpaste="handlePaste(event)">
  </div>

  <h4>Live Preview</h4>
  <div class="preview-box" id="preview"></div>

  <h4>Generated Rich Text HTML</h4>
  <textarea id="htmlOutput" rows="6" readonly></textarea>

  <script>
    // ✅ Apply formatting
    function formatText(command) {
      document.execCommand(command, false, null);
      updatePreview();
    }

    // ✅ Live preview + HTML output
    function updatePreview() {
      let html = document.getElementById('editor').innerHTML;
      document.getElementById('preview').innerHTML = html;
      document.getElementById('htmlOutput').value = html;
    }

    // ✅ Clean paste: allow only plain text
    function handlePaste(e) {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text');
      document.execCommand('insertText', false, text);
    }
  </script>

</body>
</html>

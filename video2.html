<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Summernote Editor with Preview</title>

  <!-- Bootstrap 4 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Summernote BS4 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">

  <style>
    body {
      padding: 20px;
    }

    .preview-box {
      border: 1px solid #ccc;
      min-height: 200px;
      padding: 15px;
      background: #fff;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="row">

      <!-- ✅ Editor -->
      <div class="col-md-6">
        <h4>Summernote Editor</h4>
        <textarea id="editor"></textarea>
      </div>

      <!-- ✅ Preview -->
      <div class="col-md-6">
        <h4>Live Preview</h4>

        <!-- IMPORTANT: same Summernote container -->
        <div class="note-editor note-frame">
          <div class="note-editable preview-box" id="preview"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- jQuery -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Summernote JS -->
  <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>

  <script>
    $(document).ready(function () {

      $('#editor').summernote({
        height: 250,
        callbacks: {
          onChange: function (contents) {
            // ✅ Live preview same as saved data
            $('#preview').html(contents);
          }
        }
      });

    });
  </script>

</body>
</html>

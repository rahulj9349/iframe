<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Counter</title>

  <style>
    :root {
      --primary: #9d002b;
    }

    .counter {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--primary);
      border-radius: 999px;
      padding: 2px;
      font-family: Arial, sans-serif;
    }

    .btn {
      width: clamp(32px, 8vw, 44px);
      height: clamp(32px, 8vw, 44px);
      margin: 2px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: clamp(14px, 3vw, 18px);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .value {
      min-width: clamp(30px, 10vw, 50px);
      text-align: center;
      font-size: clamp(14px, 4vw, 18px);
      color: var(--primary);
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="counter">
  <button class="btn" id="decreaseBtn" onclick="decrease()">-</button>
  <div class="value" id="value">1</div>
  <button class="btn" id="increaseBtn" onclick="increase()">+</button>
</div>

<script>
  let count = 1;

  function updateButtons() {
    document.getElementById("decreaseBtn").disabled = count <= 1;
    document.getElementById("increaseBtn").disabled = count >= 9;
  }

  function increase() {
    if (count < 9) {
      count++;
      document.getElementById("value").innerText = count;
      updateButtons();
    }
  }

  function decrease() {
    if (count > 1) {
      count--;
      document.getElementById("value").innerText = count;
      updateButtons();
    }
  }

  updateButtons();
</script>

</body>
</html>

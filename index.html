<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Counter UI</title>
  <style>
    :root {
      --primary: #9d002b; /* change root color here */
    }

    .counter {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--primary);
      border-radius: 30px;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .btn {
      width: 40px;
      height: 40px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .value {
      padding: 0 15px;
      font-size: 16px;
      min-width: 30px;
      text-align: center;
      color: var(--primary);
    }
  </style>
</head>
<body>

<div class="counter">
  <button class="btn" onclick="decrease()">-</button>
  <div class="value" id="value">5</div>
  <button class="btn" onclick="increase()">+</button>
</div>

<script>
  let count = 5;

  function increase() {
    count++;
    document.getElementById("value").innerText = count;
  }

  function decrease() {
    if (count > 0) {
      count--;
      document.getElementById("value").innerText = count;
    }
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Counter UI</title>
  <style>
    :root {
      --primary: #9d002b;
    }

    .counter {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--primary);
      border-radius: 30px;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .btn {
      width: 40px;
      height: 40px;
      margin: 2px; /* added */
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .value {
      padding: 0 10px;
      font-size: 16px;
      min-width: 30px;
      text-align: center;
      color: var(--primary);
    }
  </style>
</head>
<body>

<div class="counter">
  <button class="btn" id="decreaseBtn" onclick="decrease()">-</button>
  <div class="value" id="value">1</div>
  <button class="btn" id="increaseBtn" onclick="increase()">+</button>
</div>

<script>
  let count = 1;

  function updateButtons() {
    document.getElementById("decreaseBtn").disabled = count <= 1;
    document.getElementById("increaseBtn").disabled = count >= 9;
  }

  function increase() {
    if (count < 9) {
      count++;
      document.getElementById("value").innerText = count;
      updateButtons();
    }
  }

  function decrease() {
    if (count > 1) {
      count--;
      document.getElementById("value").innerText = count;
      updateButtons();
    }
  }

  // initialize state
  updateButtons();
</script>

</body>
</html>
